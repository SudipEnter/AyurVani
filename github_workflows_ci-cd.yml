name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

jobs:
  # ── Backend Tests ──────────────────────────────────────────
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy api/ agents/ services/ --ignore-missing-imports

      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=. --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage.xml

  # ── Frontend Tests ─────────────────────────────────────────
  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --watchAll=false --coverage

      - name: Build
        run: npm run build

  # ── Integration Tests ─────────────────────────────────────
  integration-test:
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: docker-compose -f docker-compose.yml up -d --build

      - name: Wait for services
        run: |
          sleep 15
          curl --retry 10 --retry-delay 3 http://localhost:8000/health

      - name: Run integration tests
        working-directory: ./tests/integration
        run: |
          pip install requests pytest
          pytest . -v

      - name: Tear down
        if: always()
        run: docker-compose down -v

  # ── Docker Build ───────────────────────────────────────────
  docker-build:
    needs: [integration-test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPO: ayurvani-backend
          TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$REPO:$TAG ./backend
          docker push $REGISTRY/$REPO:$TAG
          docker tag $REGISTRY/$REPO:$TAG $REGISTRY/$REPO:latest
          docker push $REGISTRY/$REPO:latest

      - name: Build and push frontend
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPO: ayurvani-frontend
          TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$REPO:$TAG ./frontend/web
          docker push $REGISTRY/$REPO:$TAG
          docker tag $REGISTRY/$REPO:$TAG $REGISTRY/$REPO:latest
          docker push $REGISTRY/$REPO:latest